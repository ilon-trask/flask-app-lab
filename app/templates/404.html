{% extends "base.html" %}

{% block title %}404 | Posts Manager{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card border-0 shadow-sm text-center">
      <div class="card-body p-5">
        <p class="display-4 fw-bold text-danger mb-3">404</p>
        <h1 class="h3 mb-3">Page not found</h1>
        <p class="text-muted mb-4">The page you requested does not exist or may have been moved.</p>
        <a class="btn btn-primary" href="{{ url_for('posts.list_posts') }}">Back home</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}

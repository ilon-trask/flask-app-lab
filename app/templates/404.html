{% extends "base.html" %}

{% block title %}404 | Not found{% endblock %}

{% block content %}
<section class="card error-card">
    <div class="card-body text-center p-5">
        <h1 class="display-3 fw-bold text-danger">404</h1>
        <h2 class="h3 mb-3">Page not found</h2>
        <p class="text-muted mb-4">The page you requested does not exist or may have been moved.</p>
        <a class="btn btn-primary" href="{{ url_for('index') }}">Back home</a>
    </div>
</section>
{% endblock %}
